name: Whole-File Token Replace (Windows)

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # manual trigger for demo

jobs:
  replace-tokens:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Replace tokens in issuer.html
        shell: pwsh
        run: |
          # ---- edit any part of the file ----
          (Get-Content issuer.html) `
            -replace '{{CI_NAV_CLASS}}', 'bg-purple-900' `
            -replace '{{CI_SITE_NAME}}', 'CertiSure Run-${{ github.run_number }}' `
            | Set-Content issuer.html

      - name: Commit & push the change
        shell: pwss
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add issuer.html
          git commit -m "CI: whole-file tokens replaced (Run ${{ github.run_number }})"
          git push
